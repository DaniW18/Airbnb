<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Airbnb vs. Janeiro Hotel — O Jogo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5ead4;
    --bg-deep: #ecdab4;
    --ink: #1c1815;
    --ink-soft: #4a423b;
    --muted: #8a7f72;
    --line: #d4bc8a;
    --gold: #d4961f;
    --rust: #c43818;
    --sage: #5a8c4a;
    --cream: #fdf7e8;
    --airbnb: #e8412c;
    --janeiro: #1f5a3c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body {
    background-image:
      radial-gradient(ellipse at top left, rgba(212, 150, 31, 0.18), transparent 55%),
      radial-gradient(ellipse at top right, rgba(232, 65, 44, 0.10), transparent 55%),
      radial-gradient(ellipse at bottom right, rgba(31, 90, 60, 0.14), transparent 55%),
      radial-gradient(ellipse at bottom left, rgba(196, 56, 24, 0.10), transparent 55%);
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.35;
    z-index: 1;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.18'/%3E%3C/svg%3E");
  }

  .container {
    position: relative;
    z-index: 2;
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 32px 60px;
    min-height: 100vh;
  }

  /* ============ HEADER ============ */
  .masthead {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 28px;
  }

  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-style: italic;
    font-size: 20px;
    letter-spacing: 0.08em;
    color: var(--rust);
  }

  .edition {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 600;
  }

  /* ============ SCOREBOARD ============ */
  .scoreboard {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 24px;
    align-items: center;
    margin-bottom: 32px;
  }

  .player {
    text-align: center;
    padding: 18px 24px;
    background: var(--cream);
    border: 1px solid var(--line);
    position: relative;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .player.active {
    border-color: var(--ink);
    background: var(--ink);
    color: var(--cream);
    transform: translateY(-3px);
    box-shadow: 0 16px 36px -10px rgba(28, 24, 21, 0.35);
  }

  .player.score-pulse {
    animation: scorePulse 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .player.score-pulse-bad {
    animation: scoreShake 0.5s ease;
  }

  @keyframes scorePulse {
    0% { transform: translateY(-3px) scale(1); }
    40% { transform: translateY(-3px) scale(1.08); box-shadow: 0 20px 50px -10px rgba(200, 155, 74, 0.6); }
    100% { transform: translateY(-3px) scale(1); }
  }

  @keyframes scoreShake {
    0%, 100% { transform: translateY(-3px) translateX(0); }
    25% { transform: translateY(-3px) translateX(-8px); }
    75% { transform: translateY(-3px) translateX(8px); }
  }

  .player-label {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--rust);
    margin-bottom: 6px;
    font-weight: 700;
  }

  .player.active .player-label { color: var(--gold); }

  .player-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 500;
    margin-bottom: 8px;
    font-style: italic;
  }

  .player-score {
    font-family: 'Cormorant Garamond', serif;
    font-size: 64px;
    font-weight: 400;
    line-height: 1;
    letter-spacing: -0.02em;
    transition: color 0.3s;
    color: var(--rust);
  }

  .player.active .player-score { color: var(--gold); }

  .vs {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 40px;
    color: var(--rust);
    font-weight: 500;
  }

  /* ============ ROUND INFO ============ */
  .round-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  .round-label {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 24px;
    color: var(--ink);
    font-weight: 500;
  }

  .round-progress { display: flex; gap: 8px; }

  .pip {
    width: 32px;
    height: 4px;
    background: var(--line);
    transition: background 0.4s ease;
    border-radius: 2px;
  }

  .pip.done { background: var(--janeiro); }
  .pip.current { background: var(--gold); box-shadow: 0 0 8px var(--gold); }

  /* ============ CARD ============ */
  .card {
    background: var(--cream);
    border: 1px solid var(--line);
    padding: 36px 44px;
    position: relative;
    box-shadow: 0 30px 60px -30px rgba(28, 24, 21, 0.18);
  }

  .card::before {
    content: '';
    position: absolute;
    top: 10px;
    left: 10px;
    right: 10px;
    bottom: 10px;
    border: 1px solid var(--line);
    pointer-events: none;
  }

  .difficulty-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    position: relative;
    z-index: 2;
  }

  .difficulty {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    padding: 8px 16px;
    border: 2px solid currentColor;
    font-weight: 700;
    border-radius: 2px;
  }

  .difficulty.easy { color: var(--sage); background: rgba(90, 140, 74, 0.08); }
  .difficulty.medium { color: var(--gold); background: rgba(212, 150, 31, 0.10); }
  .difficulty.hard { color: var(--rust); background: rgba(196, 56, 24, 0.10); }

  .points-badge {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 20px;
    color: var(--ink-soft);
  }

  .points-badge strong {
    font-style: normal;
    font-weight: 700;
    color: var(--rust);
    font-size: 26px;
  }

  /* ============ CHARACTER LAYOUT ============ */
  .character-row {
    display: grid;
    grid-template-columns: 240px 1fr;
    gap: 40px;
    align-items: center;
    margin-bottom: 32px;
    position: relative;
    z-index: 2;
  }

  .avatar-frame {
    position: relative;
    width: 240px;
    height: 288px;
    background: linear-gradient(160deg, var(--bg-deep), var(--cream));
    border: 2px solid var(--gold);
    overflow: hidden;
    box-shadow: 0 12px 30px -10px rgba(212, 150, 31, 0.4);
  }

  .avatar-frame::after {
    content: '';
    position: absolute;
    top: 8px;
    left: 8px;
    right: 8px;
    bottom: 8px;
    border: 1px solid var(--gold);
    opacity: 0.5;
    pointer-events: none;
  }

  .avatar-svg {
    width: 100%;
    height: 100%;
    display: block;
    animation: avatarIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes avatarIn {
    from { opacity: 0; transform: scale(0.85); }
    to { opacity: 1; transform: scale(1); }
  }

  .profile-info { min-width: 0; }

  .profile-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 48px;
    font-weight: 600;
    line-height: 1.05;
    margin-bottom: 6px;
    letter-spacing: -0.01em;
    color: var(--ink);
  }

  .profile-meta {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 22px;
    color: var(--rust);
    margin-bottom: 18px;
    font-weight: 500;
  }

  .profile-description {
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    line-height: 1.6;
    color: var(--ink);
    margin-bottom: 20px;
    font-weight: 400;
  }

  .profile-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .tag {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--cream);
    padding: 7px 13px;
    background: var(--janeiro);
    border-radius: 3px;
    font-weight: 600;
  }

  /* ============ CHOICES ============ */
  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    position: relative;
    z-index: 2;
  }

  .choice {
    background: transparent;
    border: 2.5px solid var(--ink);
    padding: 28px 22px;
    cursor: pointer;
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--ink);
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
    border-radius: 3px;
  }

  .choice:hover:not(:disabled) {
    transform: translateY(-4px);
    box-shadow: 0 12px 24px -6px rgba(28, 24, 21, 0.35);
  }

  .choice:disabled { cursor: not-allowed; opacity: 0.6; }

  .choice-airbnb { border-color: var(--airbnb); color: var(--airbnb); background: rgba(232, 65, 44, 0.04); }
  .choice-airbnb:hover:not(:disabled) { background: var(--airbnb); color: var(--cream); }

  .choice-janeiro { border-color: var(--janeiro); color: var(--janeiro); background: rgba(31, 90, 60, 0.05); }
  .choice-janeiro:hover:not(:disabled) { background: var(--janeiro); color: var(--cream); }

  .choice-label {
    display: block;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 6px;
    font-weight: 700;
  }

  /* ============ REVEAL DRAMA ============ */
  .reveal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(28, 24, 21, 0.85);
    z-index: 100;
    display: none;
    justify-content: center;
    align-items: center;
    padding: 24px;
    backdrop-filter: blur(8px);
  }

  .reveal-overlay.show { display: flex; animation: overlayIn 0.3s ease; }

  @keyframes overlayIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .reveal-card {
    background: var(--cream);
    border: 1px solid var(--gold);
    padding: 48px 56px;
    max-width: 640px;
    width: 100%;
    text-align: center;
    position: relative;
    animation: revealIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .reveal-card::before {
    content: '';
    position: absolute;
    top: 10px;
    left: 10px;
    right: 10px;
    bottom: 10px;
    border: 1px solid var(--gold);
    opacity: 0.4;
    pointer-events: none;
  }

  @keyframes revealIn {
    from { opacity: 0; transform: scale(0.7) translateY(40px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .verdict-banner {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 128px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 12px;
    letter-spacing: -0.03em;
    animation: verdictIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.15s both;
  }

  .verdict-banner.correct { color: var(--sage); text-shadow: 0 4px 20px rgba(90, 140, 74, 0.4); }
  .verdict-banner.wrong { color: var(--rust); text-shadow: 0 4px 20px rgba(196, 56, 24, 0.4); }

  @keyframes verdictIn {
    from { opacity: 0; transform: scale(0.5) rotate(-8deg); }
    to { opacity: 1; transform: scale(1) rotate(0); }
  }

  .verdict-points {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    color: var(--ink);
    margin-bottom: 32px;
    font-weight: 500;
    animation: fadeUp 0.6s ease 0.5s both;
  }

  .verdict-points strong {
    color: var(--gold);
    font-style: italic;
    font-size: 44px;
    font-weight: 700;
  }

  .verdict-answer {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 10px;
    font-weight: 700;
    animation: fadeUp 0.6s ease 0.7s both;
  }

  .verdict-answer-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 56px;
    font-weight: 700;
    margin-bottom: 28px;
    animation: fadeUp 0.6s ease 0.8s both;
  }

  .verdict-answer-name.airbnb-color { color: var(--airbnb); }
  .verdict-answer-name.janeiro-color { color: var(--janeiro); }

  .verdict-explanation {
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    line-height: 1.65;
    color: var(--ink);
    margin-bottom: 36px;
    font-weight: 400;
    max-width: 520px;
    margin-left: auto;
    margin-right: auto;
    animation: fadeUp 0.6s ease 1s both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .btn-next {
    background: var(--rust);
    color: var(--cream);
    border: none;
    padding: 18px 44px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
    font-weight: 700;
    animation: fadeUp 0.6s ease 1.2s both;
    border-radius: 3px;
  }

  .btn-next:hover {
    background: var(--ink);
    letter-spacing: 0.35em;
    transform: translateY(-2px);
  }

  /* ============ CONFETTI / PARTICLES ============ */
  .particle {
    position: fixed;
    width: 10px;
    height: 10px;
    z-index: 99;
    pointer-events: none;
  }

  /* ============ FINAL SCREEN ============ */
  .final {
    text-align: center;
    padding: 40px 20px;
    position: relative;
    z-index: 2;
  }

  .final-ornament {
    font-family: 'Cormorant Garamond', serif;
    font-size: 40px;
    color: var(--gold);
    margin-bottom: 16px;
    letter-spacing: 0.5em;
    animation: fadeUp 0.8s ease;
  }

  .final-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 72px;
    font-weight: 500;
    font-style: italic;
    margin-bottom: 14px;
    letter-spacing: -0.01em;
    color: var(--ink);
    animation: fadeUp 0.8s ease 0.1s both;
  }

  .final-winner-crown {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-style: italic;
    color: var(--ink-soft);
    margin-bottom: 10px;
    animation: fadeUp 0.8s ease 0.3s both;
  }

  .final-winner-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 88px;
    font-weight: 700;
    color: var(--rust);
    margin-bottom: 48px;
    letter-spacing: -0.02em;
    animation: winnerIn 1s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s both;
    text-shadow: 0 4px 20px rgba(196, 56, 24, 0.3);
  }

  @keyframes winnerIn {
    from { opacity: 0; transform: scale(0.5); }
    to { opacity: 1; transform: scale(1); }
  }

  .final-scores {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 60px;
    margin-bottom: 48px;
  }

  .final-player {
    text-align: center;
    padding: 28px 36px;
    border: 2px solid var(--line);
    background: var(--cream);
    min-width: 200px;
    transition: all 0.5s ease;
    animation: fadeUp 0.8s ease 0.7s both;
    border-radius: 3px;
  }

  .final-player.winner {
    background: var(--janeiro);
    color: var(--cream);
    border-color: var(--gold);
    border-width: 3px;
    transform: translateY(-16px);
    box-shadow: 0 24px 50px -10px rgba(31, 90, 60, 0.5);
  }

  .final-player.winner::before {
    content: '★';
    display: block;
    color: var(--gold);
    font-size: 36px;
    margin-bottom: 10px;
  }

  .final-player-name {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 22px;
    color: var(--rust);
    margin-bottom: 10px;
    font-weight: 600;
  }

  .final-player.winner .final-player-name { color: var(--gold); }

  .final-player-score {
    font-family: 'Cormorant Garamond', serif;
    font-size: 96px;
    font-weight: 400;
    line-height: 1;
    letter-spacing: -0.03em;
    color: var(--ink);
  }

  .final-player.winner .final-player-score { color: var(--cream); }

  .btn-restart {
    background: transparent;
    border: 2px solid var(--ink);
    color: var(--ink);
    padding: 16px 36px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
    font-weight: 700;
    animation: fadeUp 0.8s ease 1s both;
    border-radius: 3px;
  }

  .btn-restart:hover { background: var(--ink); color: var(--cream); }

  .fade-in { animation: cardIn 0.6s cubic-bezier(0.4, 0, 0.2, 1); }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 760px) {
    .container { padding: 20px 14px 40px; }
    .card { padding: 28px 22px; }
    .card::before { top: 8px; left: 8px; right: 8px; bottom: 8px; }
    .profile-name { font-size: 32px; }
    .profile-meta { font-size: 18px; }
    .profile-description { font-size: 16px; }
    .character-row { grid-template-columns: 1fr; gap: 20px; }
    .avatar-frame { width: 180px; height: 220px; margin: 0 auto; }
    .choices { grid-template-columns: 1fr; }
    .choice { font-size: 28px; padding: 22px 18px; }
    .scoreboard { grid-template-columns: 1fr 1fr; }
    .vs { display: none; }
    .player-score { font-size: 48px; }
    .player-name { font-size: 20px; }
    .final-scores { gap: 24px; flex-direction: column; align-items: center; }
    .final-title { font-size: 48px; }
    .final-winner-name { font-size: 56px; }
    .final-player-score { font-size: 72px; }
    .verdict-banner { font-size: 80px; }
    .verdict-answer-name { font-size: 40px; }
    .verdict-points { font-size: 22px; }
    .verdict-points strong { font-size: 30px; }
    .verdict-explanation { font-size: 16px; }
    .reveal-card { padding: 32px 24px; }
  }
</style>
</head>
<body>
  <div class="container">

    <header class="masthead">
      <div class="brand">— Hospitalidade Carioca —</div>
      <div class="edition">Edição Especial · Leblon</div>
    </header>

    <!-- Scoreboard -->
    <div class="scoreboard">
      <div class="player" id="player1">
        <div class="player-label">Jogador 1</div>
        <div class="player-name">à esquerda</div>
        <div class="player-score" id="score1">0</div>
      </div>
      <div class="vs">vs.</div>
      <div class="player" id="player2">
        <div class="player-label">Jogador 2</div>
        <div class="player-name">à direita</div>
        <div class="player-score" id="score2">0</div>
      </div>
    </div>

    <!-- Round info -->
    <div class="round-info">
      <div class="round-label" id="roundLabel">Rodada 1 de 8</div>
      <div class="round-progress" id="progress"></div>
    </div>

    <!-- Main game card -->
    <main id="gameArea"></main>

  </div>

  <!-- Reveal overlay (drama) -->
  <div class="reveal-overlay" id="revealOverlay">
    <div class="reveal-card" id="revealCard"></div>
  </div>

<script>
  // ============ AVATARS (SVG) ============
  // Cada avatar é um retrato estilizado, sem detalhes que entreguem a resposta
  const avatars = {
    marcelo: `<svg class="avatar-svg" viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
      <rect width="200" height="240" fill="#ebe3d6"/>
      <circle cx="100" cy="240" r="90" fill="#2c4a3e" opacity="0.15"/>
      <!-- Suit -->
      <path d="M40 240 L60 170 Q100 160 140 170 L160 240 Z" fill="#1c1815"/>
      <path d="M85 240 L95 175 L100 180 L105 175 L115 240 Z" fill="#faf6ef"/>
      <path d="M97 180 L100 200 L103 180 Z" fill="#b04a28"/>
      <!-- Neck -->
      <rect x="90" y="155" width="20" height="20" fill="#d4a574"/>
      <!-- Head -->

      difficulty: "hard",
      points: 3,
      explanation: "Pegadinha. Renda alta nem sempre vai pro hotel. O produto dela é a narrativa 'autêntica' que vende ao público. Hotel padronizado mata esse posicionamento. O Airbnb diferenciado é o ativo de marketing dela."
    },
    {
      name: "Ricardo & Paula",
      meta: "Bodas de Prata · Petrópolis → Rio",
      avatar: avatars.ricardoPaula,
      description: "Casados há 25 anos. Ele é engenheiro, ela é dentista. Filhos adultos. Moram a uma hora do Rio. Vão descer só por duas noites pra comemorar a data. Querem zero stress logístico — só querem chegar e existir.",
      tags: ["Aniversário", "2 noites", "Locais", "Maduros"],
      answer: "janeiro",
      difficulty: "hard",
      points: 3,
      explanation: "Pegadinha ao contrário. Podiam alugar uma cobertura linda, mas não é isso que querem comprar. Eles estão comprando ausência de fricção — alguém preparando tudo enquanto eles só aparecem. Isso é serviço, não espaço."
    }
  ];

  // ============ STATE ============
  let currentRound = 0;
  let currentPlayer = 1;
  let scores = [0, 0];
  let answered = false;

  const gameArea = document.getElementById('gameArea');
  const progress = document.getElementById('progress');
  const roundLabel = document.getElementById('roundLabel');
  const revealOverlay = document.getElementById('revealOverlay');
  const revealCard = document.getElementById('revealCard');

  // ============ INIT ============
  function init() {
    progress.innerHTML = '';
    profiles.forEach(() => {
      const pip = document.createElement('div');
      pip.className = 'pip';
      progress.appendChild(pip);
    });
    renderRound();
  }

  function updatePlayerHighlight() {
    document.getElementById('player1').classList.toggle('active', currentPlayer === 1 && currentRound < profiles.length);
    document.getElementById('player2').classList.toggle('active', currentPlayer === 2 && currentRound < profiles.length);
  }

  function updateProgress() {
    const pips = progress.children;
    for (let i = 0; i < pips.length; i++) {
      pips[i].className = 'pip';
      if (i < currentRound) pips[i].classList.add('done');
      else if (i === currentRound) pips[i].classList.add('current');
    }
    roundLabel.textContent = currentRound < profiles.length
      ? `Rodada ${currentRound + 1} de ${profiles.length}`
      : 'Resultado final';
  }

  // ============ RENDER ROUND ============
  function renderRound() {
    if (currentRound >= profiles.length) {
      renderFinal();
      return;
    }

    updatePlayerHighlight();
    updateProgress();
    answered = false;

    const p = profiles[currentRound];
    const diffLabel = { easy: 'Fácil', medium: 'Médio', hard: 'Difícil' }[p.difficulty];

    gameArea.innerHTML = `
      <div class="card fade-in">
        <div class="difficulty-row">
          <div class="difficulty ${p.difficulty}">${diffLabel}</div>
          <div class="points-badge">Vale <strong>${p.points}</strong> ${p.points === 1 ? 'ponto' : 'pontos'} · Jogador ${currentPlayer}</div>
        </div>

        <div class="character-row">
          <div class="avatar-frame">${p.avatar}</div>
          <div class="profile-info">
            <h2 class="profile-name">${p.name}</h2>
            <div class="profile-meta">${p.meta}</div>
            <p class="profile-description">${p.description}</p>
            <div class="profile-tags">
              ${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}
            </div>
          </div>
        </div>

        <div class="choices">
          <button class="choice choice-airbnb" onclick="handleChoice('airbnb')">
            <span class="choice-label">Aposta no</span>
            Airbnb
          </button>
          <button class="choice choice-janeiro" onclick="handleChoice('janeiro')">
            <span class="choice-label">Aposta no</span>
            Janeiro Hotel
          </button>
        </div>
      </div>
    `;
  }

  // ============ HANDLE CHOICE ============
  function handleChoice(choice) {
    if (answered) return;
    answered = true;

    const p = profiles[currentRound];
    const correct = choice === p.answer;
    const playerEl = document.getElementById('player' + currentPlayer);

    if (correct) {
      scores[currentPlayer - 1] += p.points;
      document.getElementById('score' + currentPlayer).textContent = scores[currentPlayer - 1];
      playerEl.classList.add('score-pulse');
      setTimeout(() => playerEl.classList.remove('score-pulse'), 700);
      launchConfetti();
    } else {
      playerEl.classList.add('score-pulse-bad');
      setTimeout(() => playerEl.classList.remove('score-pulse-bad'), 500);
    }

    document.querySelectorAll('.choice').forEach(b => b.disabled = true);

    // Show dramatic reveal overlay
    setTimeout(() => showReveal(correct, p), 400);
  }

  // ============ DRAMATIC REVEAL ============
  function showReveal(correct, p) {
    const answerLabel = p.answer === 'airbnb' ? 'Airbnb' : 'Janeiro Hotel';
    const colorClass = p.answer === 'airbnb' ? 'airbnb-color' : 'janeiro-color';
    const verdictText = correct ? 'Acertou!' : 'Errou!';
    const verdictClass = correct ? 'correct' : 'wrong';
    const pointsText = correct
      ? `Jogador ${currentPlayer} ganha <strong>+${p.points}</strong> ${p.points === 1 ? 'ponto' : 'pontos'}`
      : `Jogador ${currentPlayer} não pontua nesta rodada`;

    revealCard.innerHTML = `
      <div class="verdict-banner ${verdictClass}">${verdictText}</div>
      <div class="verdict-points">${pointsText}</div>
      <div class="verdict-answer">A resposta era</div>
      <div class="verdict-answer-name ${colorClass}">${answerLabel}</div>
      <div class="verdict-explanation">${p.explanation}</div>
      <button class="btn-next" onclick="closeReveal()">Próxima rodada →</button>
    `;
    revealOverlay.classList.add('show');
  }

  function closeReveal() {
    revealOverlay.classList.remove('show');
    setTimeout(nextRound, 300);
  }

  // ============ CONFETTI ============
  function launchConfetti() {
    const colors = ['#c89b4a', '#b04a28', '#5a6b4e', '#2c4a3e', '#d54a3a'];
    const playerEl = document.getElementById('player' + currentPlayer);
    const rect = playerEl.getBoundingClientRect();
    const originX = rect.left + rect.width / 2;
    const originY = rect.top + rect.height / 2;

    for (let i = 0; i < 28; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.background = colors[Math.floor(Math.random() * colors.length)];
      particle.style.left = originX + 'px';
      particle.style.top = originY + 'px';
      particle.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
      const angle = (Math.PI * 2 * i) / 28 + Math.random() * 0.3;
      const velocity = 80 + Math.random() * 140;
      const tx = Math.cos(angle) * velocity;
      const ty = Math.sin(angle) * velocity - 60;
      particle.animate([
        { transform: 'translate(0, 0) rotate(0deg)', opacity: 1 },
        { transform: `translate(${tx}px, ${ty + 180}px) rotate(${360 + Math.random() * 360}deg)`, opacity: 0 }
      ], {
        duration: 1100 + Math.random() * 400,
        easing: 'cubic-bezier(0.2, 0.8, 0.4, 1)'
      });
      document.body.appendChild(particle);
      setTimeout(() => particle.remove(), 1500);
    }
  }

  // ============ NEXT ============
  function nextRound() {
    currentRound++;
    currentPlayer = currentPlayer === 1 ? 2 : 1;
    renderRound();
  }

  // ============ FINAL ============
  function renderFinal() {
    updatePlayerHighlight();
    updateProgress();

    let winnerText, winnerIdx;
    if (scores[0] > scores[1]) { winnerText = 'Jogador 1 venceu'; winnerIdx = 0; }
    else if (scores[1] > scores[0]) { winnerText = 'Jogador 2 venceu'; winnerIdx = 1; }
    else { winnerText = 'Empate técnico'; winnerIdx = -1; }

    gameArea.innerHTML = `
      <div class="card">
        <div class="final">
          <div class="final-ornament">· · ·</div>
          <h2 class="final-title">Fim de jogo</h2>
          <div class="final-winner-crown">${winnerIdx === -1 ? 'Resultado' : 'O vencedor é'}</div>
          <div class="final-winner-name">${winnerText}</div>

          <div class="final-scores">
            <div class="final-player ${winnerIdx === 0 ? 'winner' : ''}">
              <div class="final-player-name">Jogador 1</div>
              <div class="final-player-score">${scores[0]}</div>
            </div>
            <div class="final-player ${winnerIdx === 1 ? 'winner' : ''}">
              <div class="final-player-name">Jogador 2</div>
              <div class="final-player-score">${scores[1]}</div>
            </div>
          </div>

          <button class="btn-restart" onclick="restart()">Jogar novamente</button>
        </div>
      </div>
    `;

    // Big celebratory confetti
    if (winnerIdx !== -1) {
      for (let burst = 0; burst < 4; burst++) {
        setTimeout(() => bigConfettiBurst(), burst * 250);
      }
    }
  }

  function bigConfettiBurst() {
    const colors = ['#c89b4a', '#b04a28', '#5a6b4e', '#2c4a3e', '#d54a3a', '#faf6ef'];
    for (let i = 0; i < 50; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.background = colors[Math.floor(Math.random() * colors.length)];
      particle.style.width = (6 + Math.random() * 8) + 'px';
      particle.style.height = (6 + Math.random() * 8) + 'px';
      particle.style.left = (window.innerWidth / 2 + (Math.random() - 0.5) * 200) + 'px';
      particle.style.top = (window.innerHeight / 2) + 'px';
      particle.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
      const angle = Math.random() * Math.PI * 2;
      const velocity = 200 + Math.random() * 300;
      const tx = Math.cos(angle) * velocity;
      const ty = Math.sin(angle) * velocity - 100;
      particle.animate([
        { transform: 'translate(0, 0) rotate(0deg)', opacity: 1 },
        { transform: `translate(${tx}px, ${ty + 400}px) rotate(${720}deg)`, opacity: 0 }
      ], {
        duration: 1800 + Math.random() * 600,
        easing: 'cubic-bezier(0.15, 0.8, 0.3, 1)'
      });
      document.body.appendChild(particle);
      setTimeout(() => particle.remove(), 2500);
    }
  }

  function restart() {
    currentRound = 0;
    currentPlayer = 1;
    scores = [0, 0];
    document.getElementById('score1').textContent = '0';
    document.getElementById('score2').textContent = '0';
    init();
  }

  init();
</script>
</body>
</html>
